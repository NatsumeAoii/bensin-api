name: Sync Pertamina Prices

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

# Prevent overlapping scheduled + manual runs from racing on the git push.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run generator (fetch upstream)
        run: |
          python pipeline/fetch_normalize.py --fetch
      - name: Run tests
        run: |
          python -m pytest pipeline/tests/
      - name: Data sanity check
        run: |
          python -m pipeline.sanity_check
      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: update v1 snapshots [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
